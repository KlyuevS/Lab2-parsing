services:
  postgres:
    image: postgres:16-alpine
    container_name: lab2_postgres
    environment:
      POSTGRES_DB: lab2
      POSTGRES_USER: lab2
      POSTGRES_PASSWORD: lab2
    ports:
      - "5432:5432"
    volumes:
      - lab2_pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab2 -d lab2"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lab2_pgdata:

